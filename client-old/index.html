<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的论坛</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">🚀 我的论坛</div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="new-post.html">发布帖子</a>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="container">
        <h1>最新讨论</h1>
        
        <!-- 筛选标签 -->
        <div class="tags">
            <button class="tag active" onclick="filterPosts('all')">全部</button>
            <button class="tag" onclick="filterPosts('blog')">我的博客</button>
            <button class="tag" onclick="filterPosts('user')">用户分享</button>
        </div>

        <!-- 帖子列表 -->
        <div id="post-list" class="post-list">
            <!-- 帖子会在这里动态生成 -->
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>updateNav();</script>
</body>
</html>
